name: Jira PR Sync (Reusable)

on:
  workflow_call:
    inputs:
      ticket-prefix:
        description: 'Jira ticket prefix (e.g., "ECOPROJECT" for tickets like ECOPROJECT-123)'
        type: string
        required: true
      no-ticket-label:
        description: 'Label to add when no Jira ticket is found'
        type: string
        default: 'no-valid-jira-ticket'
    secrets:
      JIRA_BASE_URL:
        description: 'Jira instance URL (e.g., https://yourcompany.atlassian.net)'
        required: true
      JIRA_USER_EMAIL:
        description: 'Email for Jira API authentication'
        required: true
      JIRA_API_TOKEN:
        description: 'Jira API token'
        required: true
      WORKFLOW_TOKEN:
        description: 'GitHub token with issues:write permission (optional, falls back to GITHUB_TOKEN)'
        required: false

jobs:
  sync-jira:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Sync PR with Jira
        uses: actions/github-script@v7
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          TICKET_PREFIX: ${{ inputs.ticket-prefix }}
          NO_TICKET_LABEL: ${{ inputs.no-ticket-label }}
        with:
          github-token: ${{ secrets.WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            // Log what triggered this workflow run
            const eventName = context.eventName;
            const action = context.payload.action;
            core.info(`🔍 Workflow triggered - Event: ${eventName}, Action: ${action}`);

            const prBody = context.payload.pull_request.body || '';
            const prTitle = context.payload.pull_request.title || '';
            const prNumber = context.payload.pull_request.number;
            const prUrl = context.payload.pull_request.html_url;

            // Build regex pattern from ticket prefix
            const jiraRegex = new RegExp(`${process.env.TICKET_PREFIX}-\\d+`, 'gi');
            const combinedText = `${prTitle} ${prBody}`;
            const matches = [...combinedText.matchAll(jiraRegex)];

            if (matches.length === 0) {
              // No Jira ticket found - add label
              core.info('No Jira ticket reference found in PR');
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: [process.env.NO_TICKET_LABEL]
              });
              return;
            }

            // Extract unique Jira tickets
            const foundTickets = [...new Set(matches.map(m => m[0].toUpperCase()))];
            core.info(`Found Jira ticket references: ${foundTickets.join(', ')}`);

            // Validate tickets exist in Jira
            const auth = Buffer.from(
              `${process.env.JIRA_USER_EMAIL}:${process.env.JIRA_API_TOKEN}`
            ).toString('base64');

            const validTickets = [];
            const invalidTickets = [];

            for (const ticket of foundTickets) {
              try {
                const response = await fetch(
                  `${process.env.JIRA_BASE_URL}/rest/api/3/issue/${ticket}`,
                  {
                    method: 'GET',
                    headers: {
                      'Authorization': `Basic ${auth}`,
                      'Accept': 'application/json'
                    }
                  }
                );

                if (response.ok) {
                  validTickets.push(ticket);
                  core.info(`✓ ${ticket} exists in Jira`);
                } else {
                  invalidTickets.push(ticket);
                  core.warning(`✗ ${ticket} does not exist in Jira or you don't have permission to view it`);
                }
              } catch (error) {
                invalidTickets.push(ticket);
                core.warning(`✗ Error validating ${ticket}: ${error.message}`);
              }
            }

            core.info(`Valid tickets: ${validTickets.length}, Invalid tickets: ${invalidTickets.length}`);

            if (validTickets.length === 0) {
              // No valid Jira tickets found - add label
              core.info('No valid Jira tickets found in PR');
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: [process.env.NO_TICKET_LABEL]
              });
              return;
            }

            // Remove the no-valid-jira-ticket label if we have valid tickets
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: process.env.NO_TICKET_LABEL
              });
              core.info(`Removed '${process.env.NO_TICKET_LABEL}' label`);
            } catch (error) {
              // Label might not exist, ignore
            }

            // Process only valid tickets
            const jiraTickets = validTickets;

            for (const ticket of jiraTickets) {
              try {
                // Check if remote link already exists
                const getResponse = await fetch(
                  `${process.env.JIRA_BASE_URL}/rest/api/3/issue/${ticket}/remotelink`,
                  {
                    method: 'GET',
                    headers: {
                      'Authorization': `Basic ${auth}`,
                      'Accept': 'application/json'
                    }
                  }
                );

                if (getResponse.ok) {
                  const existingLinks = await getResponse.json();
                  const linkExists = existingLinks.some(link => link.object?.url === prUrl);

                  if (linkExists) {
                    core.info(`ℹ Remote link already exists for ${ticket} to PR #${prNumber}`);
                    continue;
                  }
                }

                // Create new remote link
                const response = await fetch(
                  `${process.env.JIRA_BASE_URL}/rest/api/3/issue/${ticket}/remotelink`,
                  {
                    method: 'POST',
                    headers: {
                      'Authorization': `Basic ${auth}`,
                      'Accept': 'application/json',
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                      object: {
                        url: prUrl,
                        title: `PR #${prNumber}: ${prTitle}`,
                        icon: {
                          url16x16: 'https://github.com/favicon.ico'
                        }
                      }
                    })
                  }
                );

                if (response.ok) {
                  core.info(`✓ Successfully linked ${ticket} to PR #${prNumber}`);
                } else {
                  const errorText = await response.text();
                  core.warning(`Failed to link ${ticket}: ${errorText}`);
                }
              } catch (error) {
                core.warning(`Error linking ${ticket}: ${error.message}`);
              }
            }

            // Add Jira links to PR description
            const jiraLinksSection = jiraTickets
              .map(ticket => `- [${ticket}](${process.env.JIRA_BASE_URL}/browse/${ticket})`)
              .join('\n');

            const jiraLinkHeader = '## Jira Links';
            const newJiraSection = `${jiraLinkHeader}\n${jiraLinksSection}\n`;

            let updatedBody;
            if (prBody.includes(jiraLinkHeader)) {
              // Replace existing Jira links section (only the ## Jira Links section and its list items)
              // Match: ## Jira Links\n- [TICKET](url)\n- [TICKET](url)\n...
              // Include trailing newline to match what we create
              const regex = new RegExp(`${jiraLinkHeader}\\n(?:- \\[.*?\\]\\(.*?\\)\\n)+`, 'g');
              updatedBody = prBody.replace(regex, newJiraSection);
            } else {
              // Append Jira links section at the end
              updatedBody = prBody ? `${prBody}\n\n${newJiraSection}` : newJiraSection;
            }

            // Only update PR if content actually changed
            if (updatedBody === prBody) {
              core.info('✓ Jira links section is already up to date, no PR update needed');
              return;
            }

            // Update PR description
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              body: updatedBody
            });

            core.info('✓ Updated PR description with Jira links');
