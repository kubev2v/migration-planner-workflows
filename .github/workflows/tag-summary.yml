name: Release Tag Summary (Reusable)

on:
  workflow_call:
    # Calling workflows must use 'secrets: inherit' to pass their repository secrets

jobs:
  summarize-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout calling repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout workflow scripts repository
        uses: actions/checkout@v4
        with:
          repository: kubev2v/migration-planner-workflows
          path: .workflows-repo
          sparse-checkout: |
            ci
          sparse-checkout-cone-mode: false

      - name: Generate summary and send to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.TAG_SUMMARY_SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.TAG_SUMMARY_SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.TAG_SUMMARY_SLACK_CHANNEL }}
          NEW_TAG: ${{ github.ref_name }}
          JIRA_BASE_URL: ${{ secrets.TAG_SUMMARY_JIRA_BASE_URL }}
          JIRA_API_TOKEN: ${{ secrets.TAG_SUMMARY_JIRA_API_TOKEN }}
        run: |
          set -e

          # Validate required environment variables
          if [ -z "$SLACK_WEBHOOK_URL" ] && ([ -z "$SLACK_BOT_TOKEN" ] || [ -z "$SLACK_CHANNEL" ]); then
            echo "Error: Either SLACK_WEBHOOK_URL or (SLACK_BOT_TOKEN + SLACK_CHANNEL) must be set"
            echo "For threading support, use: SLACK_BOT_TOKEN and SLACK_CHANNEL"
            echo "For simple messaging, use: SLACK_WEBHOOK_URL"
            exit 1
          fi

          # Filter tags matching v<int>.<int>.<int> pattern, sort by version, and find the one before the new tag
          PREV_TAG=$(git tag --sort=version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | grep -B1 "^${NEW_TAG}$" | head -n 1 | grep -v "^${NEW_TAG}$" || true)

          if [ -z "$PREV_TAG" ]; then
            MESSAGE_TYPE="New Tag was created: $NEW_TAG 🎉"
            CHANGE_DETAILS="No previous tag found - skipping change list."
          else
            MERGE_BASE=$(git merge-base $PREV_TAG $NEW_TAG)
            COMMITS=$(git log --pretty=format:"%an|%s" $MERGE_BASE..$NEW_TAG)
            MESSAGE_TYPE="New Tag was created: $NEW_TAG (changes since $PREV_TAG) 🎉"

            if [ -z "$COMMITS" ]; then
              CHANGE_DETAILS="No new commits were found."
            else
              # Generate detailed changes message
              DETAILS_PAYLOAD=$(echo "$COMMITS" | .workflows-repo/ci/create-slack-message.sh)

              # Parse JSON to get the text content
              if [ -n "$DETAILS_PAYLOAD" ] && CHANGE_DETAILS=$(echo "$DETAILS_PAYLOAD" | jq -r '.text' 2>/dev/null); then
                echo "Successfully generated commit details with JIRA integration"
              else
                echo "WARNING: Could not parse JSON output, using fallback"
                CHANGE_DETAILS="Unable to parse commit details"
              fi
            fi
          fi

          # Use the new send-slack-message script
          .workflows-repo/ci/send-slack-message.sh "$MESSAGE_TYPE" "$CHANGE_DETAILS"
